name: Feature request
description: Suggest a new descriptor, transform, or other enhancement
labels: [enhancement]
body:
  - type: textarea
    id: motivation
    attributes:
      label: What problem would this solve?
      description: Describe the use case this feature would enable.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed? If proposing a new descriptor, please include a reference to the original publication.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered.
    validations:
      required: false
