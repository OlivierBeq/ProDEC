name: Bug report
description: Report a problem with ProDEC
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short code snippet that reproduces the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ProDEC version
      placeholder: e.g. 1.0.2.post5 (`python -c "from prodec.version import VERSION; print(VERSION)"`)
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
